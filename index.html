<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Cocina</title>
    <!-- Importa la librería model-viewer de Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #202124; /* Fondo oscuro para que resalte el modelo */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        h1 {
            margin-bottom: 10px;
        }

        /* Estilos del contenedor del modelo 3D */
        model-viewer {
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            background-color: #303134;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Opcional: mostrar una barra de carga personalizada */
            --poster-color: transparent;
        }

        /* Barra de progreso de carga nativa de model-viewer */
        #progress-bar {
            width: 100%;
            height: 5px;
            background-color: #5f5f5f;
            position: absolute;
            top: 0;
            left: 0;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            overflow: hidden;
        }
        
        #progress-bar.hide {
            visibility: hidden;
            transition: visibility 0.3s;
        }

        #update-bar {
            background-color: #4285f4;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.9em;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <h1>Vista 3D</h1>
    
    <!-- Componente model-viewer -->
    <!-- 'src' debe apuntar exactamente al nombre de tu archivo -->
    <model-viewer 
        src="cocinae1.glb" 
        alt="Modelo 3D de una cocina" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1" 
        exposure="1"
        ar>
        
        <!-- Barra de progreso visual mientras el modelo (34MB) se descarga -->
        <div slot="progress-bar" id="progress-bar">
            <div id="update-bar"></div>
        </div>

    </model-viewer>

    <p class="instructions">Click izquierdo para rotar | Scroll para hacer zoom | Click derecho para mover</p>

    <script>
        // Script para animar la barra de carga
        const modelViewer = document.querySelector('model-viewer');
        const progressUpdateBar = document.querySelector('#update-bar');
        const progressBar = document.querySelector('#progress-bar');

        modelViewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress * 100;
            progressUpdateBar.style.width = `${progress}%`;
            
            if (progress === 100) {
                setTimeout(() => {
                    progressBar.classList.add('hide');
                }, 500);
            }
        });
    </script>
</body>
</html>
